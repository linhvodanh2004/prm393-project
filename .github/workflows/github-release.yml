name: Build APK and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Flutter (cache luôn cho nhanh)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # 3. Restore .env
      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      # 4. Build APK
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      # 5. Verify APK
      - name: Verify APK exists
        run: |
          ls -la build/app/outputs/flutter-apk/
          test -f build/app/outputs/flutter-apk/app-release.apk

      # 6. Setup GitHub CLI (đã có sẵn, chỉ cần auth)
      - name: Authenticate GitHub CLI
        run: gh auth setup-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. Delete old release + tag (an toàn)
      - name: Delete old release if exists
        run: |
          gh release delete latest -y || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8. Create new release + upload APK
      - name: Create new release
        run: |
          gh release create latest \
            build/app/outputs/flutter-apk/app-release.apk \
            --title "Latest APK" \
            --notes "Auto build from commit ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}