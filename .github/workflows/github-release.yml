name: Build APK and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      # 🔍 Debug
      - name: Check APK
        run: ls -la build/app/outputs/flutter-apk/

      # 🧹 Xoá release cũ (nếu có)
      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v1
        with:
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # 🚀 Tạo release mới
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest APK
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}